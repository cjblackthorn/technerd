title: TechNerd Consulting
description: Enterprise-informed cybersecurity governance, identity, risk, audit readiness, and practical security consulting.
author: C. J. Blackthorn
email: technerdconsultingllc@gmail.com
url: "https://technerd.tech"
baseurl: ""

markdown: kramdown
permalink: pretty

sass:
  sass_dir: assets/css
  style: compressed

collections:
  services:
    output: true
    permalink: /services/:path/
  packages:
    output: true
    permalink: /services/packages/:path/
  a_la_carte:
    output: true
    permalink: /services/a-la-carte/:path/
  projects:
    output: true
    permalink: /projects/:path/
  insights:
    output: true
    permalink: /insights/:path/
  resources_library:
    output: true
    permalink: /resources/:path/
  frameworks:
    output: true
    permalink: /frameworks/:path/

defaults:
  - scope:
      path: ""
      type: services
    values:
      layout: service
  - scope:
      path: ""
      type: packages
    values:
      layout: package
  - scope:
      path: ""
      type: a_la_carte
    values:
      layout: a-la-carte-item
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: insights
    values:
      layout: insight
  - scope:
      path: ""
      type: resources_library
    values:
      layout: resource
  - scope:
      path: ""
      type: frameworks
    values:
      layout: framework

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
