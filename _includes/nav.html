<header class="site-header">
  <div class="container nav-container">
    {% assign current_url = page.url %}
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="TechNerd Consulting home">
      <img class="brand-node" src="{{ '/assets/images/logo-mark.svg' | relative_url }}" alt="" aria-hidden="true">
      <span class="desktop-brand-text">{TechNerd}</span>
    </a>

    <div class="mobile-header-brand">{TechNerd}</div>

    <nav class="desktop-nav" aria-label="Primary navigation">
      <ul class="nav-links">
        {% for item in site.data.navigation %}
          <li>
            <a href="{{ item.url | relative_url }}"{% if current_url == item.url %} aria-current="page"{% endif %}>{{ item.label }}</a>
          </li>
        {% endfor %}
        <li>
          <a class="button button-primary nav-cta" href="{{ '/request-consultation/' | relative_url }}"{% if current_url == '/request-consultation/' %} aria-current="page"{% endif %}>
            Request Consultation
          </a>
        </li>
      </ul>
    </nav>

    <details class="mobile-nav">
      <summary>Menu</summary>
      <nav aria-label="Mobile navigation" class="mobile-dropdown">
        <ul class="mobile-nav-links">
          {% for item in site.data.navigation %}
            <li>
              <a href="{{ item.url | relative_url }}"{% if current_url == item.url %} aria-current="page"{% endif %}>{{ item.label }}</a>
            </li>
          {% endfor %}
          <li>
            <a class="button button-primary nav-cta" href="{{ '/request-consultation/' | relative_url }}"{% if current_url == '/request-consultation/' %} aria-current="page"{% endif %}>
              Request Consultation
            </a>
          </li>
        </ul>
      </nav>
    </details>
  </div>
</header>
