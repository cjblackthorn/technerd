<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#111827">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:image" content="{{ '/assets/images/technerd-social-preview.svg' | absolute_url }}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }} | {{ site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ '/assets/images/technerd-social-preview.svg' | absolute_url }}">

  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/technerd.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/pages.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  {% include nav.html %}

  <main id="main-content" class="container">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/technerd.js' | relative_url }}"></script>
</body>
</html>
